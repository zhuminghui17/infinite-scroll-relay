<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Relay logs</title>
  <style>
    body { font-family: ui-monospace, monospace; margin: 16px; padding-bottom: calc(3.25rem + env(safe-area-inset-bottom, 0px)); background: #0f0f12; color: #e8e8ec; }
    h1 { font-size: 1rem; font-weight: 600; margin: 0 0 12px; }
    pre { white-space: pre-wrap; word-break: break-word; margin: 0; font-size: 12px; line-height: 1.45; }
    .meta { color: #71717a; margin-bottom: 12px; font-size: 12px; }
    a { color: #93c5fd; }
    .status-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 10;
      font-size: 12px;
      margin: 0;
      padding: 10px 16px calc(10px + env(safe-area-inset-bottom, 0px));
      background: #18181b;
      border-top: 1px solid #27272a;
      box-sizing: border-box;
    }
    .status-bar .state { font-weight: 600; }
    .status-bar .state.ok { color: #4ade80; }
    .status-bar .state.fail { color: #f87171; }
    .status-bar .sep { margin: 0 10px; color: #52525b; }
  </style>
</head>
<body>
  <h1>Relay logs</h1>
  <p class="meta">Refreshes every 2s · <a href="/logs">JSON</a></p>
  <pre id="out"></pre>
  <div class="status-bar" id="statusBar">
    Gateway: <span class="state fail" id="gwState">…</span>
    <span class="sep">·</span>
    Printer: <span class="state fail" id="prState">…</span>
  </div>
  <script>
    async function refreshHealth() {
      var gw = document.getElementById('gwState');
      var pr = document.getElementById('prState');
      try {
        var r = await fetch('/health', { headers: { Accept: 'application/json' } });
        if (!r.ok) {
          gw.textContent = 'error';
          pr.textContent = 'error';
          gw.className = 'state fail';
          pr.className = 'state fail';
          return;
        }
        var j = await r.json();
        gw.textContent = j.gatewayConnected ? 'connected' : 'disconnected';
        gw.className = j.gatewayConnected ? 'state ok' : 'state fail';
        pr.textContent = j.printerConnected ? 'online' : 'offline';
        pr.className = j.printerConnected ? 'state ok' : 'state fail';
      } catch (e) {
        gw.textContent = 'unreachable';
        pr.textContent = '—';
        gw.className = 'state fail';
        pr.className = 'state fail';
      }
    }
    async function load() {
      const out = document.getElementById('out');
      try {
        const r = await fetch('/logs' + location.search, { headers: { Accept: 'application/json' } });
        if (!r.ok) { out.textContent = r.status + ' ' + r.statusText; return; }
        const j = await r.json();
        out.textContent = (j.entries || []).map(function (e) {
          return '[' + e.ts + '] ' + e.level.toUpperCase() + ' ' + e.message;
        }).join('\n');
      } catch (e) {
        out.textContent = String(e);
      }
    }
    refreshHealth();
    setInterval(refreshHealth, 3000);
    load();
    setInterval(load, 2000);
  </script>
</body>
</html>
